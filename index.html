<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=no" />
  <title>Ruby Wong's Menu</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      overflow: hidden;
      font-family: "Helvetica Neue", sans-serif;
    }
    .swiper {
      width: 100vw;
      height: 100vh;
      background: #000;
      perspective: 2200px;
    }
    .swiper-slide {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
      backface-visibility: hidden;
      perspective: 1000px;
      transform-style: preserve-3d;
      position: relative;
    }
    .swiper-slide img {
      width: 100%;
      height: auto;
      object-fit: contain;
      border-radius: 12px;
      will-change: transform;
      user-select: none;
      touch-action: none;
      backface-visibility: hidden;
      transform-origin: center center;
      transform: translate3d(0px, 0px, 0px) scale(1);
    }
    /* Smooth CSS transition class explicitly used during double-tap actions */
    .swiper-slide img.is-animating {
      transition: transform 0.2s ease-out !important;
    }
    .swiper-button-next,
    .swiper-button-prev {
      color: #fff;
      opacity: 0.6;
      transition: opacity 0.3s;
    }
    .swiper-button-next:hover,
    .swiper-button-prev:hover {
      opacity: 1;
    }
    .swiper-pagination-bullet {
      background: #fff !important;
      opacity: 0.5;
    }
    .swiper-pagination-bullet-active {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="swiper">
    <div class="swiper-wrapper"></div>
    <div class="swiper-button-next"></div>
    <div class="swiper-button-prev"></div>
    <div class="swiper-pagination"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script>
    // ----- Create 31 slides -----
    const wrapper = document.querySelector(".swiper-wrapper");
    for (let i = 1; i <= 31; i++) {
      const slide = document.createElement("div");
      slide.className = "swiper-slide";
      slide.innerHTML = `<img src="menu/page${i}.jpg" alt="Page ${i}" loading="lazy" />`;
      wrapper.appendChild(slide);
    }

    // Append two extra pages as the last pages
    const extraFiles = [
      "menu/page32.jpg",
      "menu/page33.jpg",
    ];
    extraFiles.forEach((path, idx) => {
      const slide = document.createElement("div");
      slide.className = "swiper-slide";
      slide.innerHTML = `<img src="${encodeURI(path)}" alt="Extra Page ${31 + idx + 1}" loading="lazy" />`;
      wrapper.appendChild(slide);
    });

    // ----- Swiper setup -----
    const swiper = new Swiper(".swiper", {
      effect: "cube",
      cubeEffect: { shadow: false, slideShadows: false },
      grabCursor: true,
      speed: 650,
      loop: false,
      preloadImages: true,
      navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" },
      pagination: { el: ".swiper-pagination", clickable: true },
    });

    // ----- Comprehensive Zoom + Edge Bounds Pan Handling -----
    const initZoomHandlers = () => {
      document.querySelectorAll(".swiper-slide img").forEach((img) => {
        let scale = 1, isZoomed = false;
        let originX = 0, originY = 0;
        let moveX = 0, moveY = 0;
        let lastX = 0, lastY = 0;
        let startX = 0, startY = 0;
        let startDist = 0;
        let lastTouchCount = 0;
        let startScale = 1;
        let doubleTap = 0;
        let transformId = null;

        const updateTransform = () => {
          img.style.transformOrigin = `${originX}px ${originY}px`;
          img.style.transform = `translate3d(${moveX}px, ${moveY}px, 0) scale(${scale})`;
        };

        const requestTransformUpdate = () => {
          if (transformId) cancelAnimationFrame(transformId);
          transformId = requestAnimationFrame(updateTransform);
        };

        // Calculates maximum allowed drag based on current scale and screen margins
        const clampBoundaries = () => {
          if (scale <= 1) {
            moveX = moveY = 0;
            return;
          }
          const rect = img.getBoundingClientRect();
          const viewW = window.innerWidth;
          const viewH = window.innerHeight;

          // X boundary bounds calculation
          if (rect.width > viewW) {
            const maxGetX = (rect.width - viewW) / 2;
            const currentOriginOffset = (viewW / 2 - originX) * (scale - 1);
            const relativeX = moveX + currentOriginOffset;
            if (Math.abs(relativeX) > maxGetX) {
              moveX = (relativeX > 0 ? maxGetX : -maxGetX) - currentOriginOffset;
            }
          } else {
            moveX = 0;
          }

          // Y boundary bounds calculation
          if (rect.height > viewH) {
            const maxGetY = (rect.height - viewH) / 2;
            const currentOriginOffset = (viewH / 2 - originY) * (scale - 1);
            const relativeY = moveY + currentOriginOffset;
            if (Math.abs(relativeY) > maxGetY) {
              moveY = (relativeY > 0 ? maxGetY : -maxGetY) - currentOriginOffset;
            }
          } else {
            moveY = 0;
          }
        };

        const setOrigin = (touch) => {
          const rect = img.getBoundingClientRect();
          const unscaledW = rect.width / scale;
          const unscaledH = rect.height / scale;
          originX = Math.max(0, Math.min(unscaledW, (touch.clientX - rect.left) / scale));
          originY = Math.max(0, Math.min(unscaledH, (touch.clientY - rect.top) / scale));
        };

        const setSwiperLock = () => {
          if (typeof swiper !== 'undefined') swiper.allowTouchMove = !isZoomed;
        };

        // Double tap toggle with smooth CSS tracking
        img.addEventListener("touchend", (e) => {
          const now = Date.now();
          if (lastTouchCount === 1 && now - doubleTap < 300 && e.changedTouches.length === 1) {
            img.classList.add("is-animating");
            setOrigin(e.changedTouches[0]);
            isZoomed = !isZoomed;
            scale = isZoomed ? 2.5 : 1;
            moveX = moveY = lastX = lastY = 0;
            
            if (isZoomed) clampBoundaries();
            setSwiperLock();
            updateTransform();

            setTimeout(() => img.classList.remove("is-animating"), 200);
          }
          doubleTap = now;
        });

        // Touch start entry point
        img.addEventListener("touchstart", (e) => {
          img.classList.remove("is-animating");
          lastTouchCount = e.touches.length;
          
          if (e.touches.length === 1 && isZoomed) {
            startX = e.touches[0].clientX - lastX;
            startY = e.touches[0].clientY - lastY;
          } else if (e.touches.length === 2) {
            const dx = e.touches[1].pageX - e.touches[0].pageX;
            const dy = e.touches[1].pageY - e.touches[0].pageY;
            startDist = Math.hypot(dx, dy);
            startScale = scale;
            const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
            const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
            setOrigin({ clientX: midX, clientY: midY });
            isZoomed = true;
            setSwiperLock();
          }
        });

        // Pan and Pinch tracking loops
        img.addEventListener("touchmove", (e) => {
          if (e.touches.length === 1 && isZoomed) {
            e.preventDefault();
            moveX = e.touches[0].clientX - startX;
            moveY = e.touches[0].clientY - startY;
            clampBoundaries();
            lastX = moveX;
            lastY = moveY;
          } else if (e.touches.length === 2) {
            e.preventDefault();
            const dx = e.touches[1].pageX - e.touches[0].pageX;
            const dy = e.touches[1].pageY - e.touches[0].pageY;
            const dist = Math.hypot(dx, dy);
            if (!startDist) startDist = dist;
            
            scale = Math.min(Math.max(startScale * (dist / startDist), 1), 4);
            isZoomed = scale > 1.05;
            clampBoundaries();
            setSwiperLock();
          }
          requestTransformUpdate();
        }, { passive: false });

        img.addEventListener("touchend", (e) => {
          startDist = 0;
          startScale = scale;
          if (scale <= 1.05) {
            img.classList.add("is-animating");
            scale = 1;
            isZoomed = false;
            moveX = moveY = lastX = lastY = 0;
            img.style.transformOrigin = "center center";
            setSwiperLock();
            updateTransform();
            setTimeout(() => img.classList.remove("is-animating"), 200);
          }
        });

        // Global page turns cleanly clean stale positions
        swiper.on("slideChange", () => {
          scale = 1;
          moveX = moveY = lastX = lastY = 0;
          isZoomed = false;
          img.style.transformOrigin = "center center";
          setSwiperLock();
          updateTransform();
        });
      });
    };

    // Safely trigger loop instantiation when DOM is ready
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", () => setTimeout(initZoomHandlers, 150));
    } else {
      setTimeout(initZoomHandlers, 150);
    }
  </script>
</body>
</html>
