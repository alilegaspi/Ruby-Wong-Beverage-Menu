<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=no" />
  <title>Ruby Wong's Menu</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      overflow: hidden;
      font-family: "Helvetica Neue", sans-serif;
    }
    .swiper {
      width: 100vw;
      height: 100vh;
      background: #000;
      perspective: 2200px;
    }
    .swiper-slide {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
      backface-visibility: hidden;
      perspective: 1000px;
      transform-style: preserve-3d;
      position: relative;
    }
    .swiper-slide img {
      width: 100%;
      height: auto;
      object-fit: contain;
      border-radius: 12px;
      will-change: transform;
      user-select: none;
      touch-action: none;
      backface-visibility: hidden;
      transform-origin: center center;
      transition: transform 0.15s ease-out, opacity 0.35s ease;
      opacity: 0;
    }
    .swiper-slide img.loaded { opacity: 1; }
    .swiper-lazy-preloader {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.12);
      border-top-color: rgba(255,255,255,0.9);
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      animation: spin 0.9s linear infinite;
      z-index: 5;
    }
    @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }
    .swiper-button-next,
    .swiper-button-prev {
      color: #fff;
      opacity: 0.6;
      transition: opacity 0.3s;
    }
    .swiper-button-next:hover,
    .swiper-button-prev:hover {
      opacity: 1;
    }
    .swiper-pagination-bullet {
      background: #fff !important;
      opacity: 0.5;
    }
    .swiper-pagination-bullet-active {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="swiper">
    <div class="swiper-wrapper"></div>
    <div class="swiper-button-next"></div>
    <div class="swiper-button-prev"></div>
    <div class="swiper-pagination"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script>
    // ----- Create 31 slides (use Swiper lazy loading) -----
    const wrapper = document.querySelector(".swiper-wrapper");
    for (let i = 1; i <= 31; i++) {
      const slide = document.createElement("div");
      slide.className = "swiper-slide";
      slide.innerHTML = `
        <img class="swiper-lazy" data-src="menu/page${i}.jpg" alt="Page ${i}" decoding="async" />
        <div class="swiper-lazy-preloader"></div>
      `;
      // attach load handler to fade-in when actual src is assigned
      slide.querySelector('img').addEventListener('load', (ev) => ev.target.classList.add('loaded'));
      wrapper.appendChild(slide);
    }

    // Append two extra pages (attached images) as the last pages
    const extraFiles = [
      "menu/page32.jpg",
      "menu/page33.jpg",
    ];
    extraFiles.forEach((path, idx) => {
      const slide = document.createElement("div");
      slide.className = "swiper-slide";
      slide.innerHTML = `
        <img class="swiper-lazy" data-src="${encodeURI(path)}" alt="Extra Page ${31 + idx + 1}" decoding="async" />
        <div class="swiper-lazy-preloader"></div>
      `;
      slide.querySelector('img').addEventListener('load', (ev) => ev.target.classList.add('loaded'));
      wrapper.appendChild(slide);
    });

    // ----- Swiper setup (book-style page flip) -----
    const swiper = new Swiper(".swiper", {
      effect: "flip",
      grabCursor: true,
      speed: 650,
      loop: false,
      preloadImages: false, // let Swiper lazy-load images
      lazy: { loadPrevNext: true, loadPrevNextAmount: 2 },
      flipEffect: { slideShadows: true, limitRotation: true },
      navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" },
      pagination: { el: ".swiper-pagination", clickable: true },
    });

    // ----- Zoom + Pan with point awareness -----
    document.querySelectorAll(".swiper-slide img").forEach((img) => {
      let scale = 1, isZoomed = false;
      let originX = 0, originY = 0;
      let moveX = 0, moveY = 0;
      let lastX = 0, lastY = 0;
      let startX = 0, startY = 0;
      let startDist = 0;
      let lastTouchCount = 0;
      let startScale = 1;
      let doubleTap = 0;

      const updateTransform = () => {
        img.style.transformOrigin = `${originX}px ${originY}px`;
        img.style.transform = `translate3d(${moveX}px, ${moveY}px, 0) scale(${scale})`;
      };

      // Compute transform origin from touch point
      const setOrigin = (touch) => {
        const rect = img.getBoundingClientRect();
        originX = Math.max(0, Math.min(rect.width, touch.clientX - rect.left));
        originY = Math.max(0, Math.min(rect.height, touch.clientY - rect.top));
      };

      const setSwiperLock = () => {
        if (typeof swiper !== 'undefined') swiper.allowTouchMove = !isZoomed;
      };

      // Double tap zoom to point
      img.addEventListener("touchend", (e) => {
        const now = Date.now();
        // Only treat as double-tap when the interaction was single-touch
        if (lastTouchCount === 1 && now - doubleTap < 300 && e.changedTouches.length === 1) {
          setOrigin(e.changedTouches[0]);
          isZoomed = !isZoomed;
          scale = isZoomed ? 2.5 : 1;
          moveX = moveY = lastX = lastY = 0;
          setSwiperLock();
          updateTransform();
        }
        doubleTap = now;
      });

      // Touch start
      img.addEventListener("touchstart", (e) => {
        lastTouchCount = e.touches.length;
        if (e.touches.length === 1 && isZoomed) {
          startX = e.touches[0].clientX - lastX;
          startY = e.touches[0].clientY - lastY;
        } else if (e.touches.length === 2) {
          const dx = e.touches[1].pageX - e.touches[0].pageX;
          const dy = e.touches[1].pageY - e.touches[0].pageY;
          startDist = Math.hypot(dx, dy);
          startScale = scale;
          const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
          const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
          setOrigin({ clientX: midX, clientY: midY });
          isZoomed = true;
          setSwiperLock();
        }
      });

      // Pan + pinch
      img.addEventListener("touchmove", (e) => {
        if (e.touches.length === 1 && isZoomed) {
          e.preventDefault();
          moveX = e.touches[0].clientX - startX;
          moveY = e.touches[0].clientY - startY;
          lastX = moveX;
          lastY = moveY;
        } else if (e.touches.length === 2) {
          e.preventDefault();
          const dx = e.touches[1].pageX - e.touches[0].pageX;
          const dy = e.touches[1].pageY - e.touches[0].pageY;
          const dist = Math.hypot(dx, dy);
          if (!startDist) startDist = dist;
          const zoom = Math.min(Math.max(startScale * (dist / startDist), 1), 4);
          scale = zoom;
          isZoomed = scale > 1.05;
          setSwiperLock();
        }
        requestAnimationFrame(updateTransform);
      }, { passive: false });

      img.addEventListener("touchend", (e) => {
        startDist = 0;
        startScale = scale;
        if (scale <= 1.01) {
          scale = 1;
          isZoomed = false;
          moveX = moveY = lastX = lastY = 0;
          img.style.transformOrigin = "center center";
          setSwiperLock();
          updateTransform();
        }
      });

      // Reset zoom between pages
      swiper.on("slideChange", () => {
        scale = 1;
        moveX = moveY = lastX = lastY = 0;
        isZoomed = false;
        img.style.transformOrigin = "center center";
        setSwiperLock();
        updateTransform();
      });
    });
  </script>
</body>
</html>
